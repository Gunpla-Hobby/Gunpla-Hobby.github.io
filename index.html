<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta property="og:title" content="祥平君的微型宇宙" id="og-title">
  <meta property="og:description" content="模型帶來的，是真實與夢境交錯的奇異之美。" id="og-description">

  <title id="title">手中的微型宇宙</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <script>
    window.data = [{
      "filename": "GGun01",
      "initCtrl": '{"alpha":0.5,"beta":0.5,"radius":2.327313838079992,"target":{"x":0.004759100617923059,"y":-0.1455406537039348,"z":0.09320018357337091}}',
      "title": "流派！東方不敗は！\n王者の風よ！",
      "description": "流派！東方不敗は王者の風よ！全新系裂！天破侠乱！見よ！東方は赤く燃えているぅぅぅ！\n新一派，東方不敗，王者之風，全新招式，石破天驚，看招，血染東方一片紅！"
    }, {
      "filename": "Qan[T]01",
      "title": "你40米的大砍刀\n剛好削我15米長的鉛筆",
      "description": "00鋼彈的機體實在太多了，到底哪個是哪個我也不了解。乾脆就收武器配件最多的這個好了，你看這把大砍刀可以拆成小武器可以合體盾牌，真方便。\n唯一的約點就是放在PB搶不到，還得加價跟黃牛買...."
    }]
    document.getElementById('og-title').content = `${window.data[0].title} - ${document.getElementById('og-title').content}`
    document.getElementById('title').textContent = document.getElementById('og-title').content
    document.getElementById('og-description').content = window.data[0].descript || document.getElementById('og-description').content
    document.getElementById('og-image').content = window.data[0].filename
      ? `splatData/${window.data[0].filename}.png`
      : document.getElementById('og-image').content
  </script>
  <style>
    html {
      font-size: 62.5%;
    }

    body {
      overflow: hidden;
      font-family: Iansui;
      height: 100dvh;
      margin: 0;
      padding: 0;
      font-size: 1.2rem;
      display: flex;
      justify-content: center;
      color: #d8ecf8be;
      background: #05060f linear-gradient(0deg, rgba(216, 236, 248, .06), rgba(152, 192, 239, .06));
    }

    #splatCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
    }

    .page {
      min-width: 100vw;
      min-height: 100dvh;
    }

    .horizontal .page {
      max-width: 42rem;
      min-width: 42rem;
    }

    .swiper {
      width: 100vw;
      padding: 0 1rem;
      position: fixed;
      display: flex;
      bottom: 2rem;
    }

    .swiper .item img {
      border-radius: 2em;
      border-radius: 0.75rem;
      border: 1px solid #878DB1;
      width: 5rem;
      height: 5rem;
    }

    @font-face {
      font-family: 'Iansui';
      src: url('Iansui-Regular.ttf') format("truetype");
    }

    @font-face {
      font-family: 'UoqMunThenKhung';
      src: url('UoqMunThenKhung-1.000.ttf') format("truetype");
    }
  </style>
</head>

<body>
  <canvas id="splatCanvas"></canvas>
  <div class="page">
    <div class="swiper">
      <!--template id="slide-template">
      </template-->
      <div class="item">
        <img src="splatData/GGun01.png"></img>
      </div>
    </div>
    <!--div>祥平君's&nbsp;</div>
    <div>玩物喪志</div-->
  </div>

  <div class="header">
    <div class="spotlight">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <canvas id="particleCanvas"></canvas>

  <div class="accent-lines">
    <div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
    <div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <script>
    const loadScript = (name, useModule = true) => new Promise((resolve) => {
      const script = document.createElement('script')
      script.src = `${name}?dummy = ${new Date().getTime()} `
      script.type = useModule ? 'module' : 'text/javascript'
      script.onload = resolve
      document.head.appendChild(script)
    })

    const loadStyle = (name) => new Promise((resolve) => {
      const link = document.createElement('link')
      link.rel = 'stylesheet'
      link.href = `${name}?dummy = ${Math.floor(new Date().getTime())}`
      link.onload = resolve
      document.head.appendChild(link)
    })

    Promise.all([
      loadStyle('eclipx.css'),
      loadScript('eclipx.js'),
      loadScript('gsplat.js'),
    ]).then(() => {
      loadScript('index.js')
    })
  </script>
</body>

</html>
