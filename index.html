<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <style>
    html {
      font-size: 62.5%;
    }

    body {
      overflow: hidden;
      font-family: Iansui;
      height: 100dvh;
      margin: 0;
      padding: 0;
      font-size: 1.2rem;
      display: flex;
      justify-content: center;
      color: #d8ecf8be;
      background: #05060f linear-gradient(0deg, rgba(216, 236, 248, .06), rgba(152, 192, 239, .06));
    }

    #splatCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
    }

    .page {
      min-width: 100vw;
      min-height: 100dvh;
    }

    .horizontal .page {
      max-width: 42rem;
      min-width: 42rem;
    }

    .swiper {
      width: 100%;
      position: absolute;
      display: flex;
      bottom: 2rem;
    }

    .swiper .item {}

    .swiper .item img {
      border-radius: 2em;
      border-radius: 0.75rem;
      border: 1px solid #878DB1;
      width: 5rem;
      height: 5rem;
    }

    @font-face {
      font-family: 'Iansui';
      src: url('Iansui-Regular.ttf') format("truetype");
    }

    @font-face {
      font-family: 'UoqMunThenKhung';
      src: url('UoqMunThenKhung-1.000.ttf') format("truetype");
    }
  </style>
</head>

<body>
  <canvas id="splatCanvas"></canvas>
  <div class="page">
    <div class="swiper">
      <!--template id="slide-template">
      </template-->
      <div class="item">
        <img src="splatData/GGun01.png"></img>
      </div>
    </div>
    <!--div>祥平君's&nbsp;</div>
    <div>玩物喪志</div-->
  </div>

  <div class="header">
    <div class="spotlight">
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <canvas id="particleCanvas"></canvas>

  <div class="accent-lines">
    <div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
    <div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <script>
    const loadScript = (name, useModule = true) => new Promise((resolve) => {
      const script = document.createElement('script')
      script.src = `${name}?dummy=${new Date().getTime()}`
      script.type = useModule ? 'module' : 'text/javascript'
      script.onload = resolve
      document.head.appendChild(script)
    })

    const loadStyle = (name) => new Promise((resolve) => {
      const link = document.createElement('link')
      link.rel = 'stylesheet'
      link.href = `${name}?dummy=${Math.floor(new Date().getTime())}`
      link.onload = resolve
      document.head.appendChild(link)
    })

    Promise.all([
      loadStyle('eclipx.css'),
      loadScript('eclipx.js'),
      loadScript('gsplat.js'),
    ]).then(() => {
      loadScript('index.js')
    })
  </script>
</body>

</html>
